<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FadeThat</title>
  <meta name="description" content="FadeThat home page" />
  <style>
    :root {
      --bg: #f4f4f4;
      --surface: #ffffff;
      --text: #111111;
      --muted: #444444;
      --accent: #111111;
      --accent-dark: #000000;
      --line: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Courier New", Courier, monospace;
      color: var(--text);
      background: var(--bg);
    }

    .shell {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .nav {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
      padding: 18px 22px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--surface);
    }

    .nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.98rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .nav a:hover,
    .nav a:focus-visible {
      color: var(--accent-dark);
    }

    .hero {
      margin-top: 28px;
      padding: 56px 30px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--surface);
      overflow: hidden;
      position: relative;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .lede {
      max-width: 640px;
      margin: 0 0 22px;
      font-size: 1.02rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .mini-link {
      margin: 0 0 18px;
      font-size: 0.88rem;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .mini-link:hover,
    .mini-link:focus-visible {
      text-decoration: underline;
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 0;
      border: 1px solid var(--text);
      text-decoration: none;
      color: var(--text);
      background: var(--surface);
      font-weight: 600;
    }

    .button.icon-link {
      gap: 10px;
    }

    .sc-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      fill: currentColor;
      flex: 0 0 auto;
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .button:hover,
    .button:focus-visible {
      text-decoration: underline;
    }

    .note {
      margin-top: 26px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .hero {
        padding: 40px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav" aria-label="Primary">
      <a href="./">Home</a>
      <a href="scraper/">Scraper</a>
      <a href="privacy/">Privacy</a>
      <a href="terms/">Terms</a>
    </nav>

    <main class="hero">
      <h1>Fade That</h1>
      <a
        class="mini-link"
        href="https://soundcloud.com/fader1/tracks"
        target="_blank"
        rel="noreferrer"
        aria-label="Open Fader1 SoundCloud tracks"
      >
        <svg class="sc-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 15h1v4H3v-4Zm3-2h1v6H6v-6Zm3-4h1v10H9V9Zm3-2h1v12h-1V7Zm2 8a4 4 0 0 1 4-4 4 4 0 1 1 0 8h-6v-4h2Z" />
        </svg>
        Fader1 SoundCloud
      </a>
      <p class="lede">
        welcome
      </p>

      <div class="actions">
        <a class="button primary" href="scraper/">Open Scraper</a>
      </div>

      <div class="note">
        [ NOTICE ]
        <br />
        Send <strong>zbarrons1@gmail.com</strong> a photo to trigger the Instagram post agent.
        Please use no subject line.
      </div>
    </main>
  </div>
</body>
</html>
