<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FadeThat</title>
  <meta name="description" content="FadeThat home page" />
  <link rel="stylesheet" href="styles/site.css" />
</head>
<body class="page-home">
  <div class="orb a" aria-hidden="true"></div>
  <div class="orb b" aria-hidden="true"></div>

  <div class="shell">
    <nav class="nav" aria-label="Primary">
      <a class="fade-link" href="./" aria-current="page">fade</a>
      <a href="optin/">optin</a>
      <a href="privacy/">privacy</a>
      <a href="terms/">terms</a>
    </nav>

    <main class="hero" id="hero-card">
      <h1>fade that</h1>

      <a
        class="spotify-link"
        href="https://open.spotify.com/"
        target="_blank"
        rel="noreferrer"
        aria-label="Open FadeThat on Spotify"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 1.5a10.5 10.5 0 1 0 0 21 10.5 10.5 0 0 0 0-21Zm4.86 15.2a.78.78 0 0 1-1.07.27 9.79 9.79 0 0 0-7.63-.93.78.78 0 1 1-.46-1.49 11.35 11.35 0 0 1 8.84 1.08.78.78 0 0 1 .32 1.07Zm1.52-2.62a.97.97 0 0 1-1.33.35 12.2 12.2 0 0 0-9.37-1.15.97.97 0 1 1-.53-1.86 14.14 14.14 0 0 1 10.88 1.33.97.97 0 0 1 .35 1.33Zm.13-2.75a1.16 1.16 0 0 1-1.59.42c-3.3-1.96-8.34-2.14-11.5-.96a1.16 1.16 0 1 1-.81-2.17c3.63-1.35 9.26-1.09 13.5 1.35a1.16 1.16 0 0 1 .4 1.36Z" />
        </svg>
      </a>

      <p class="lede">welcome</p>

      <div class="actions">
        <a class="button giant" href="https://fadethat.life/tooling">submit</a>
      </div>

      <div class="note">
        [ NOTICE ]
        <br />
        Send <strong>zbarrons1@gmail.com</strong> a photo to trigger the Instagram post agent.
        Please use no subject line.
      </div>
    </main>
  </div>

  <script>
    const root = document.documentElement;
    const hero = document.getElementById("hero-card");

    let rafId = 0;
    let pointerX = 50;
    let pointerY = 50;

    function paintMotion() {
      root.style.setProperty("--px", `${pointerX}%`);
      root.style.setProperty("--py", `${pointerY}%`);

      const tiltX = ((pointerY - 50) / 50) * 4;
      const tiltY = ((pointerX - 50) / 50) * -6;
      hero.style.transform = `perspective(980px) rotateX(${tiltX.toFixed(2)}deg) rotateY(${tiltY.toFixed(2)}deg)`;

      rafId = 0;
    }

    function queuePaint() {
      if (!rafId) {
        rafId = requestAnimationFrame(paintMotion);
      }
    }

    window.addEventListener("pointermove", (event) => {
      pointerX = (event.clientX / window.innerWidth) * 100;
      pointerY = (event.clientY / window.innerHeight) * 100;
      queuePaint();
    });

    window.addEventListener("blur", () => {
      pointerX = 50;
      pointerY = 50;
      queuePaint();
    });
  </script>
</body>
</html>
